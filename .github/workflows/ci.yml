name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
    - uses: actions/checkout@v7
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install \
          fastapi uvicorn python-multipart httpx \
          python-docx python-pptx openpyxl \
          PyPDF2 pdfplumber reportlab fpdf \
          beautifulsoup4 requests lxml markdown python-frontmatter \
          numpy scikit-learn networkx xmindparser notion-client \
          pydantic python-dotenv tqdm watchdog pytest
    - name: Run tests
      env:
        EMBEDDING_MODEL: tfidf
        AI_PROVIDER: none
      run: |
        python -m pytest

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    - name: Lint with flake8
      run: |
        # 停止构建，如果有语法错误或未定义的名称
        flake8 . --exclude=.git,.venv,.venv-ci-ubuntu,venv,data,logs,__pycache__ --count --select=E9,F63,F7,F82 --show-source --statistics
        # 更宽松的检查
        flake8 . --exclude=.git,.venv,.venv-ci-ubuntu,venv,data,logs,__pycache__ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics